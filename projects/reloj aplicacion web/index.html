<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protector - Dashboard de Estructura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input, select { background: #0f172a; border: 1px solid #334155; color: #38bdf8; padding: 0.6rem; border-radius: 0.5rem; width: 100%; transition: all 0.3s; }
        input:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="p-4 sm:p-8 max-w-2xl mx-auto">

    <header class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">🛡️ Protector <span class="text-blue-500">v2.0</span></h1>
            <p class="text-slate-500 text-sm">Auditoría de Tiempo y Capital</p>
        </div>
        <div class="text-right text-xs text-slate-400">
            <p id="fecha-actual"></p>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-2xl">
            <h2 class="text-blue-400 font-bold mb-4 flex items-center gap-2">
                📅 Horario Laboral
            </h2>
            <div class="space-y-4 text-sm">
                <div>
                    <label class="block text-slate-400 mb-1">Días Laborales</label>
                    <select id="esquema-dias" onchange="calcular()">
                        <option value="5">Lunes a Viernes (5 días)</option>
                        <option value="6">Lunes a Sábado (6 días)</option>
                        <option value="4">Martes a Sábado (5 días)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-slate-400 mb-1">Entrada</label>
                        <input type="time" id="hora-entrada" value="07:00" onchange="calcular()">
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1">Salida</label>
                        <input type="time" id="hora-salida" value="16:00" onchange="calcular()">
                    </div>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl">
            <h2 class="text-green-400 font-bold mb-4 flex items-center gap-2">
                💰 Tasas y Sueldo
            </h2>
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-slate-400 mb-1">Sueldo Nominal ($ BCV)</label>
                    <input type="number" id="sueldo" value="250" oninput="calcular()">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-slate-400 mb-1">BCV</label>
                        <input type="number" id="bcv" value="443.26" oninput="calcular()">
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1">P2P Binance</label>
                        <input type="number" id="p2p" value="610" oninput="calcular()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-6 grid grid-cols-1 sm:grid-cols-3 gap-4 text-center">
        <div class="glass p-4 rounded-xl border-b-4 border-blue-500">
            <p class="text-xs text-slate-400 uppercase">Poder Real</p>
            <p class="text-2xl font-bold" id="res-usdt">0 USDT</p>
        </div>
        <div class="glass p-4 rounded-xl border-b-4 border-red-500">
            <p class="text-xs text-slate-400 uppercase">Pérdida Brecha</p>
            <p class="text-2xl font-bold text-red-400" id="res-perdida">0 $</p>
        </div>
        <div class="glass p-4 rounded-xl border-b-4 border-green-500">
            <p class="text-xs text-slate-400 uppercase">Valor Hora</p>
            <p class="text-2xl font-bold text-green-400" id="res-hora">0 $</p>
        </div>
    </div>

    <div class="mt-6 glass p-6 rounded-2xl">
        <h2 class="font-bold mb-4">🛒 Conversor de Artículos a Vida</h2>
        <div class="flex gap-4 items-end">
            <div class="flex-1">
                <label class="text-xs text-slate-400">Precio del Artículo ($)</label>
                <input type="number" id="art-precio" value="10" oninput="calcular()">
            </div>
            <div class="flex-1 p-3 bg-blue-900/20 rounded-lg border border-blue-800 text-center">
                <p class="text-xs text-blue-300">Te cuesta:</p>
                <p class="font-bold text-lg" id="res-tiempo">0h</p>
            </div>
        </div>
    </div>

   <script>
    // Función para obtener las tasas automáticamente desde una API
    async function actualizarTasas() {
        try {
            // Usamos DolarApi para obtener BCV y Paralelo
            const response = await fetch('https://ve.dolarapi.com/v1/dolares');
            const data = await response.json();

            // Buscamos los valores específicos en el array que devuelve la API
            const tasaBCV = data.find(d => d.nombre === "Oficial").promedio;
            const tasaP2P = data.find(d => d.nombre === "EnParaleloVzla").promedio;

            // Inyectamos los valores en los inputs de tu HTML
            document.getElementById('bcv').value = tasaBCV;
            document.getElementById('p2p').value = tasaP2P;

            // Ejecutamos el cálculo inicial con los datos frescos
            calcular();
        } catch (error) {
            console.error("Error al obtener tasas: ", error);
            // Si falla, el usuario aún puede usar los valores manuales
        }
    }

    function calcular() {
        // Datos
        const sueldo = parseFloat(document.getElementById('sueldo').value) || 0;
        const bcv = parseFloat(document.getElementById('bcv').value) || 0;
        const p2p = parseFloat(document.getElementById('p2p').value) || 0;
        const diasSemana = parseInt(document.getElementById('esquema-dias').value);
        const entrada = document.getElementById('hora-entrada').value;
        const salida = document.getElementById('hora-salida').value;
        const precioArt = parseFloat(document.getElementById('art-precio').value) || 0;

        // Calcular horas diarias
        const hEntrada = new Date(`2026-01-01T${entrada}`);
        const hSalida = new Date(`2026-01-01T${salida}`);
        let diffMs = hSalida - hEntrada;
        let horasDiarias = diffMs / (1000 * 60 * 60);
        
        // Restar 1h de almuerzo si la jornada es mayor a 5h
        if(horasDiarias > 5) horasDiarias -= 1; 

        // Cálculos Financieros
        const bsTotales = sueldo * bcv;
        const usdtReales = bsTotales / p2p;
        const perdida = sueldo - usdtReales;
        
        const diasAlMes = diasSemana * 4.34; // Promedio mensual semanas
        const horasTotalesMes = horasDiarias * diasAlMes;
        const valorHora = usdtReales / horasTotalesMes;

        // Resultados Tiempo
        const tiempoVida = precioArt / valorHora;

        // Actualizar UI
        document.getElementById('res-usdt').innerText = usdtReales.toFixed(2) + " USDT";
        document.getElementById('res-perdida').innerText = "-" + perdida.toFixed(2) + " $";
        document.getElementById('res-hora').innerText = valorHora.toFixed(2) + " $";
        
        let tiempoTexto = "";
        if(tiempoVida < 1) {
            tiempoTexto = (tiempoVida * 60).toFixed(0) + " min";
        } else {
            tiempoTexto = tiempoVida.toFixed(1) + " h (" + (tiempoVida/horasDiarias).toFixed(1) + " d)";
        }
        document.getElementById('res-tiempo').innerText = tiempoTexto;
    }

    // Al cargar el documento
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('fecha-actual').innerText = new Date().toLocaleDateString();
        // Intentar actualizar tasas automáticamente
        actualizarTasas();
        // Si no hay internet o falla la API, el calcular() se llama dentro de actualizarTasas o aquí como respaldo
        calcular();
    });
</script>
</body>
</html>
